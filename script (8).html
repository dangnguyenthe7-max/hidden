<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Console</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    color:#ffffff;
    font-family:Consolas, monospace;
    height:100vh;
    overflow:hidden;
}

#console{
    width:100%;
    height:100vh;
    overflow-y:auto;
    padding:20px;
    white-space:pre-wrap;
    word-break:break-word;
}

.line{
    margin-bottom:12px;
}

.system{
    color:#ffaa00;
}

.user{
    color:#00ff88;
}

.ai{
    color:#00bfff;
}

.error{
    color:#ff5555;
}

.input-wrapper{
    display:flex;
    align-items:center;
    margin-top:10px;
}

.prompt{
    color:#00ff88;
    margin-right:10px;
}

#input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    font-family:Consolas, monospace;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#333;
}

</style>

</head>
<body>

<div id="console"></div>

<script>

// ========================================
// CONFIG
// ========================================

const API_KEY = "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";

const MODEL = "google/gemma-4-26b-a4b-it";

const URL = "https://openrouter.ai/api/v1/chat/completions";

const MEMORY_KEY = "ai_console_memory";

// ========================================
// SYSTEM PROMPT
// ========================================

const SYSTEM_PROMPT = `
Bạn là AI trợ lý tiếng Việt.
Nói chuyện tự nhiên.
Trả lời rõ ràng.
Ghi nhớ hội thoại dài hạn.
`;

// ========================================
// ELEMENT
// ========================================

const consoleDiv = document.getElementById("console");

let input;

// ========================================
// PRINT
// ========================================

function print(text="", className=""){

    const div = document.createElement("div");

    div.className = `line ${className}`;

    div.textContent = text;

    consoleDiv.appendChild(div);

    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

// ========================================
// INPUT
// ========================================

function createInput(){

    const wrapper = document.createElement("div");

    wrapper.className = "input-wrapper";

    const prompt = document.createElement("span");

    prompt.className = "prompt";

    prompt.textContent = "Bạn:";

    input = document.createElement("input");

    input.type = "text";

    input.id = "input";

    input.autocomplete = "off";

    wrapper.appendChild(prompt);

    wrapper.appendChild(input);

    consoleDiv.appendChild(wrapper);

    input.focus();

    consoleDiv.scrollTop = consoleDiv.scrollHeight;

    input.addEventListener(
        "keydown",
        handleInput
    );
}

// ========================================
// MEMORY
// ========================================

function loadMemory(){

    try{

        const raw = localStorage.getItem(MEMORY_KEY);

        if(!raw){

            return [
                {
                    role:"system",
                    content:SYSTEM_PROMPT
                }
            ];
        }

        return JSON.parse(raw);

    }catch(e){

        print(
            "LOAD MEMORY ERROR: " + e,
            "error"
        );

        return [
            {
                role:"system",
                content:SYSTEM_PROMPT
            }
        ];
    }
}

function saveMemory(messages){

    try{

        localStorage.setItem(
            MEMORY_KEY,
            JSON.stringify(messages)
        );

    }catch(e){

        print(
            "SAVE MEMORY ERROR: " + e,
            "error"
        );
    }
}

// ========================================
// CLEAR MEMORY
// ========================================

function clearMemory(){

    localStorage.removeItem(MEMORY_KEY);

    messages = [
        {
            role:"system",
            content:SYSTEM_PROMPT
        }
    ];

    print(
        "Đã xóa memory.",
        "system"
    );
}

// ========================================
// SUMMARIZE MEMORY
// ========================================

async function summarizeMemory(messages){

    if(messages.length < 60){

        return messages;
    }

    let oldChat = messages.slice(1,40);

    let text = "";

    for(const m of oldChat){

        text += `${m.role}: ${m.content}\n`;
    }

    const summaryPrompt = `
Tóm tắt toàn bộ hội thoại sau.

CHAT:
${text}

YÊU CẦU:
- giữ context
- giữ nhân vật
- giữ sự kiện
- viết ngắn gọn
`;

    const payload = {

        model:MODEL,

        messages:[
            {
                role:"system",
                content:"Bạn là AI tóm tắt memory."
            },
            {
                role:"user",
                content:summaryPrompt
            }
        ],

        temperature:0.3,

        max_tokens:300
    };

    try{

        const response = await fetch(URL,{

            method:"POST",

            headers:{
                "Authorization":`Bearer ${API_KEY}`,
                "Content-Type":"application/json"
            },

            body:JSON.stringify(payload)
        });

        const data = await response.json();

        if(data.error){

            print(
                "SUMMARY ERROR:\n" +
                JSON.stringify(
                    data.error,
                    null,
                    2
                ),
                "error"
            );

            return messages;
        }

        const summary =
            data.choices?.[0]
            ?.message?.content || "";

        let newMessages = [

            messages[0],

            {
                role:"system",
                content:
                "MEMORY TÓM TẮT:\n" +
                summary
            }
        ];

        newMessages.push(
            ...messages.slice(-20)
        );

        saveMemory(newMessages);

        return newMessages;

    }catch(e){

        print(
            "SUMMARY REQUEST ERROR: " + e,
            "error"
        );

        return messages;
    }
}

// ========================================
// MAIN INPUT
// ========================================

async function handleInput(e){

    if(e.key !== "Enter"){

        return;
    }

    const user =
        input.value.trim();

    if(!user){

        return;
    }

    input.disabled = true;

    input.parentElement.remove();

    print(
        `Bạn: ${user}`,
        "user"
    );

    // =========================
    // COMMANDS
    // =========================

    if(user.toLowerCase() === "exit"){

        print(
            "Đã thoát.",
            "system"
        );

        return;
    }

    if(user.toLowerCase() === "/clear"){

        clearMemory();

        createInput();

        return;
    }

    if(user.toLowerCase() === "/memory"){

        print(
            JSON.stringify(
                messages,
                null,
                2
            ),
            "system"
        );

        createInput();

        return;
    }

    // =========================
    // SAVE USER MESSAGE
    // =========================

    messages.push({

        role:"user",

        content:user
    });

    saveMemory(messages);

    // =========================
    // SUMMARIZE
    // =========================

    messages =
        await summarizeMemory(messages);

    // =========================
    // PAYLOAD
    // =========================

    const payload = {

        model:MODEL,

        messages:messages,

        temperature:0.8,

        top_p:0.95,

        presence_penalty:0.4,

        frequency_penalty:0.3,

        max_tokens:500
    };

    print(
        "AI đang nhập...",
        "system"
    );

    try{

        const response = await fetch(URL,{

            method:"POST",

            headers:{

                "Authorization":
                `Bearer ${API_KEY}`,

                "Content-Type":
                "application/json",

                "HTTP-Referer":
                location.origin,

                "X-OpenRouter-Title":
                "AI Console"
            },

            body:JSON.stringify(payload)
        });

        const data =
            await response.json();

        // remove loading
        const systems =
            document.querySelectorAll(
                ".system"
            );

        const lastSystem =
            systems[systems.length - 1];

        if(
            lastSystem &&
            lastSystem.textContent
            === "AI đang nhập..."
        ){

            lastSystem.remove();
        }

        // =========================
        // API ERROR
        // =========================

        if(data.error){

            print(
                "API ERROR:\n" +
                JSON.stringify(
                    data.error,
                    null,
                    2
                ),
                "error"
            );

            createInput();

            return;
        }

        // =========================
        // INVALID RESPONSE
        // =========================

        if(!data.choices){

            print(
                "INVALID RESPONSE:\n" +
                JSON.stringify(
                    data,
                    null,
                    2
                ),
                "error"
            );

            createInput();

            return;
        }

        // =========================
        // AI REPLY
        // =========================

        const reply =
            data.choices[0]
            .message.content;

        print(
            `AI: ${reply}`,
            "ai"
        );

        messages.push({

            role:"assistant",

            content:reply
        });

        saveMemory(messages);

    }catch(err){

        print(
            "REQUEST ERROR:\n" +
            err,
            "error"
        );
    }

    createInput();
}

// ========================================
// START
// ========================================

let messages = loadMemory();

print(
    "AI READY",
    "system"
);

print(
    "Commands: /clear | /memory | exit",
    "system"
);

createInput();

</script>

</body>
</html>
